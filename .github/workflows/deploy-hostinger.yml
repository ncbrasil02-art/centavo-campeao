name: Deploy Hostinger
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Build
        run: bun run build:hostinger
      - name: Install sshpass
        run: sudo apt-get install -y sshpass
      - name: Deploy com retry automatico
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          MAX=5
          DELAY=30
          for i in $(seq 1 $MAX); do
            echo ">>> Tentativa $i de $MAX..."
            if sshpass -e rsync -avz --delete \
              -e "ssh -p 65002 -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
              dist/client/ \
              "${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }}:/home/u386043061/domains/centavodomilhao.online/public_html/"; then
              echo "Deploy OK na tentativa $i"
              exit 0
            fi
            [ $i -lt $MAX ] && echo "Aguardando $DELAY segundos..." && sleep $DELAY
          done
          echo "ERRO: todas as $MAX tentativas falharam"
          exit 1
