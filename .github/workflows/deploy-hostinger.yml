name: Deploy Hostinger
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Build
        run: bun run build:hostinger
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST_CENTAVODOMILHAO }}
          username: ${{ secrets.FTP_USER_CENTAVODOMILHAO }}
          password: ${{ secrets.FTP_PASS_CENTAVODOMILHAO }}
          port: 21
          local-dir: ./dist/client/
          server-dir: /public_html/
