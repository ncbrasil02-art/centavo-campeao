name: Deploy para Clientes (FTP Hostinger)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Hostinger estatico
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Build Hostinger
        run: npm run build:hostinger

      - name: Criar htaccess compatível com Hostinger
        run: |
          cat > dist/client/.htaccess <<'EOF'
          DirectoryIndex index.html
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule . /index.html [L]
          EOF

      - name: Verificar arquivos publicados
        run: |
          test -f dist/client/index.html
          test -d dist/client/assets

      - name: Salvar site estatico
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          include-hidden-files: true
          path: dist/client/

  deploy-centavodomilhao:
    name: Deploy centavodomilhao.online
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar site estatico
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: site/

      - name: Upload FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST_CENTAVODOMILHAO }}
          username: ${{ secrets.FTP_USER_CENTAVODOMILHAO }}
          password: ${{ secrets.FTP_PASS_CENTAVODOMILHAO }}
          local-dir: site/
          server-dir: ./
          dangerous-clean-slate: true

  deploy-lancecerto:
    name: Deploy lancecerto.site
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar site estatico
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: site/

      - name: Upload FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST_LANCECERTO }}
          username: ${{ secrets.FTP_USER_LANCECERTO }}
          password: ${{ secrets.FTP_PASS_LANCECERTO }}
          local-dir: site/
          server-dir: ./
          dangerous-clean-slate: true
